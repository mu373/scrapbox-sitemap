name: Generate sitemap

on:
  workflow_dispatch:
  schedule:
    - cron: "15 21 * * *" # JST 6:15

env:
  SID: ${{ secrets.SID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  EXPORT_JSON_PATH: export.json

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download latest export json from S3
        id: s3-download
        continue-on-error: true
        working-directory: sitemap
        run: aws s3 cp s3://${{ secrets.S3_BUCKET }}/${{ secrets.S3_PREFIX }}/${{ vars.PROJECT_NAME }}/latest.json export.json

      - name: Unset EXPORT_JSON_PATH if S3 download failed
        if: steps.s3-download.outcome == 'failure'
        run: echo "EXPORT_JSON_PATH=" >> $GITHUB_ENV

      - name: Make output directory
        run: mkdir -p sitemap/out

      - name: Generate sitemap.xml
        run: cd sitemap && deno run --allow-net=scrapbox.io --allow-read=./ --allow-write --allow-env index.ts

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./sitemap/out/"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
